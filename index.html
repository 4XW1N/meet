<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMeet - 4 Digit Rooms</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>

    <header>
        <div class="logo">QuickMeet</div>
        <div class="connection-controls">
            <div>
                <span class="id-label">Room Code:</span>
                <strong id="display-id">Setting up...</strong>
            </div>
            <input type="text" id="remote-id-input" maxlength="4" placeholder="4-Digit Code">
            <button class="call-btn" id="connect-btn">Join Room</button>
        </div>
    </header>

    <main class="video-container">
        <div class="video-wrapper">
            <video id="local-video" autoplay muted playsinline></video>
            <div class="video-label">You</div>
        </div>
        
        <div class="video-wrapper">
            <video id="remote-video" autoplay playsinline></video>
            <div class="video-label">Remote User</div>
        </div>
    </main>

    <div class="controls-bar">
        <button class="control-btn" id="toggle-mic" title="Mute/Unmute Mic">🎙️</button>
        <button class="control-btn" id="toggle-video" title="Turn Camera On/Off">📷</button>
        <button class="control-btn end-call" id="hangup-btn" title="End Call" onclick="window.location.reload();">❌</button>
    </div>

</body>
</html>
