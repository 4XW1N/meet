<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuickMeet Pro - 4-Digit Rooms</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
    <script src="app.js" defer></script>
</head>
<body>

    <div id="home-page" class="home-container">
        <header class="home-header">
            <div class="logo">✨ QuickMeet Pro</div>
            <div class="current-time" id="live-clock">00:00 • PM</div>
        </header>

        <main class="home-hero">
            <div class="hero-left">
                <h1>Group video meetings.<br>Now with simple 4-digit codes.</h1>
                <p class="subtitle">Upgraded to a global SFU architecture. Host stable group calls on GitHub Pages that work perfectly across mobile data networks.</p>
                
                <div class="action-box">
                    <div class="host-panel">
                        <span class="action-label">Your Shareable Meeting Link</span>
                        <div class="code-display-row">
                            <div class="generated-code" id="display-link" title="Click to copy">Generating link...</div>
                        </div>
                    </div>

                    <div class="divider-line"></div>

                    <div class="join-panel">
                        <input type="text" id="remote-id-input" maxlength="4" placeholder="Enter 4-digit code">
                        <button class="join-btn" id="connect-btn">Join Meeting</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="call-page" class="call-container hidden">
        <main class="video-grid" id="video-grid-container">
            </main>

        <div class="controls-bar">
            <button class="control-btn" id="toggle-mic" title="Mute/Unmute Mic">🎙️</button>
            <button class="control-btn" id="toggle-video" title="Turn Camera On/Off">📷</button>
            <button class="control-btn end-call" id="hangup-btn" title="Leave Call" onclick="window.location.reload();">❌</button>
        </div>
    </div>

</body>
</html>
